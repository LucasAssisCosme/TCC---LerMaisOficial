<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="/frontend/src/css/redefinirSenha.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  
  </head>
  <body>
    <main class="login-page">
        <img src="" alt="">
      <div class="login-card">
        <h1 class="title">REDEFINIR A SENHA</h1>

        <form action="/" method="POST" class="redefinir-form">
          <div class="mb-3">
          <label for="inputEmail" class="form-label">Email</label>
            <input
              type="email"
              id="inputEmail"
              class="form-control form-control-lg"
              placeholder="Digite seu email"
              name="email"
              required
            />
          </div>
          <div class="mb-3">
            <label for="inputNovaSenha" class="form-label">Nova Senha</label>
            <input
              type="password"
              id="inputNovaSenha"
              class="form-control form-control-lg"
              placeholder="Digite sua nova senha"
              name="nova_senha"
              required
            />
          </div>

          <div class="mb-3">
            <label for="inputConfirmarSenha" class="form-label">Confirmar Senha</label>
            <input
              type="password"
              id="inputConfirmarSenha"
              class="form-control form-control-lg"
              placeholder="Digite sua senha"
              name="senha"
              required
            />

          </div>

            <button type="submit" class="login-2">
                CONFIRMAR
            </button>
        </form>

       
        </div>
      </div>
    </main>

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> -->
     <script src="script.js"></script>
  </body>
</html>
