<main class="main-container">

  <!-- CARD DE STATUS -->
  <section class="overview-card">

        <div class="status-item">
          <span class="pill pill-lido"></span>
          <span>Lido</span>
        </div>

        <div class="status-item">
          <span class="pill pill-quero"></span>
          <span>Quero ler</span>

        <div class="status-item">
          <span class="pill pill-lendo"></span>
          <span>Lendo</span>
        </div>
      </div>

      <div class="paginometro">
        <span class="badge bg-light text-dark">Paginômetro 0</span>
      </div>
    </div>

    <h2 class="ranking-text mb-2">
      Você está em <strong>-º lugar</strong> no ranking de mais páginas lidas da sua universidade!
    </h2>
  </section>


  <!-- BUSCA -->
  <section class="books-section">
    <div class="books-header">
      <h3>0 itens encontrados</h3>
      <div class="search-box books-grid">
        <span>🔍</span>
        <input type="search" placeholder="Buscar livros">

    </div>


    <!-- GRID -->
    <div class="books-grid">
      <div class="row"></div>
    </div>
  </section>

</main>
