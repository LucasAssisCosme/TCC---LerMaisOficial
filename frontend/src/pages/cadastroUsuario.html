<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ler Mais - Cadastro de Usuario</title>
    <link rel="stylesheet" href="../css/cadastroUsuario.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="">
    <main class="login-page">
      <img src="" alt="" />
      <div class="login-card">
        <h1 class="title">CADASTRO DE USUARIO</h1>

        <form action="#" method="POST" class="cadastro-form">
          <div class="mb-3">
            <label for="inputNome" class="form-label">Nome Do Usuario</label>
            <input
              type="nome"
              id="inputNome"
              class="form-control form-control-lg"
              placeholder="Digite seu nome"
              name="nome"
              required
            />
          </div>

          <div class="mb-3">
            <label for="inputEmail" class="form-label">Email</label>
            <input
              type="email"
              id="inputEmail"
              class="form-control form-control-lg"
              placeholder="Digite seu email"
              name="email"
              required
            />
          </div>

          <div class="mb-3">
            <label for="inputGeneroFavorito" class="form-label">Genero Favorito</label>
            <select
              name="genero_favorito"
              id="inputGeneroFavorito"
              class="form-control form-control-lg"
              required
            >
              <option value="">Selecione seu genero favorito</option>
              <option value="Romance">Romance</option>
              <option value="Fantasia">Fantasia</option>
              <option value="Terror">Terror</option>
              <option value="Aventura">Aventura</option>
              <option value="Ficcao_Cientifica">Ficcao Cientifica</option>
              <option value="Drama">Drama</option>
              <option value="Autoajuda">Autoajuda</option>
              <option value="Outro">Outro</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="inputApelido" class="form-label">Apelido</label>
            <input
              type="text"
              id="inputApelido"
              class="form-control form-control-lg"
              placeholder="Digite seu apelido"
              name="apelido"
              required
            />
          </div>

          <div class="mb-3">
            <label for="inputSenha" class="form-label">Senha</label>
            <input
              type="password"
              id="inputSenha"
              class="form-control form-control-lg"
              placeholder="Digite sua senha"
              name="senha"
              required
            />
          </div>

          <button type="submit" class="login-1">CONFIRMAR</button>

            <div class="extras text-center">
          <p class="mb-2"> JÃ¡ possui uma conta? <a href="../../login.html">Clique aqui!</a></p>

        </div>
        </form>
      </div>
    </main>

    <script src="/frontend-config.js"></script>
    <script src="../../script.js"></script>
  </body>
</html>
