<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ler Mais - Cadastro de Usuário</title>
    <link rel="stylesheet" href="/frontend/src/css/cadastroUsuario.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  
  </head>
  <body class="">
    <main class="login-page">
        <img src="" alt="">
      <div class="login-card">
        <h1 class="title">CADASTRO DE USUÁRIO</h1>

        <form action="/frontend/src/pages/index.html" method="POST" class="cadastro-form">
          <div class="mb-3">
            <label for="inputNome" class="form-label">Nome Do Usuario</label>
            <input
              type="nome"
              id="inputNome"
              class="form-control form-control-lg"
              placeholder="Digite seu nome"
              name="nome"
              required
            />
          </div>
          <div class="mb-3">
            <label for="inputEmail" class="form-label">Email</label>
            <input
              type="email"
              id="inputEmail"
              class="form-control form-control-lg"
              placeholder="Digite seu email"
              name="email"
              required
            />
           
          </div>

          <div class="mb-3">
            <label for="inputTipoUsuario" class="form-label">Tipo de Usuário</label>
            <select name="tipo_usuario" id="inputTipoUsuario" class="form-control form-control-lg">
              <option value="">Selecione o tipo de usuário</option>
              <option value="aluno">Aluno</option>
              <option value="bibliotecario">Bibliotecário</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="inputSenha" class="form-label">Senha</label>
            <input
              type="password"
              id="inputSenha"
              class="form-control form-control-lg"
              placeholder="Digite sua senha"
              name="senha"
              required
            />
          </div>

            <button type="submit" class="login-1">
                CONFIRMAR
            </button>
        </form>

       
        </div>
      </div>
    </main>

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> -->
     <script src="../../script.js"></script>
  </body>
</html>
