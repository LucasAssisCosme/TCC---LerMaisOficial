<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ler Mais</title>
  <link rel="stylesheet" href="/frontend/src/css/index.css">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  >
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="home-page">
  <header>
    <div class="header">
      <div class="info-perfil">
        <img src="../../logo.png" alt="">
        <div class="perfil">
          <img src="../../User.png" alt="">
          <a href="/frontend/src/pages/perfil.html">
            PERFIL
          </a>
        </div>
      </div>

      <nav>
        <ul class="nav-list">
          <li class="item-list">
            <a href="/frontend/src/pages/index.html">
              <i class="bi bi-house"></i>
              Início
            </a>
          </li>

          <li class="item-list">
            <a href="/frontend/src/pages/cadastroLivro.html">
              <i class="bi bi-plus-circle"></i>
              Cadastrar
            </a>
          </li>

          <li class="item-list active">
            <a href="/frontend/src/pages/biblioteca.html">
              <i class="bi bi-book"></i>
              Biblioteca
            </a>
          </li>

          <li class="item-list">
            <a href="/frontend/login.html">
              <i class="bi bi-box-arrow-right"></i>
              Sair
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="banner">
    <div class="banner-left">
      <h1>BEM-VINDO AO<br>LER MAIS!</h1>
    </div>

    <div class="banner-right">
      <p>
        Bem-vindo! Cada livro é uma nova descoberta.
        Estamos com você nessa jornada. Boa leitura!
      </p>
    </div>
  </section>

  <main>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Pesquise livros">
    </div>

    <section class="books-container" id="categoriesContainer">
      <h2 class="section-title">MAIS FAMOSOS DO MOMENTO</h2>
    </section>
  </main>

  <div
    class="modal"
    id="livrosModal"
    tabindex="-1"
    aria-labelledby="livrosModalTitulo"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable livros-modal-dialog">
      <div class="modal-content livros-modal-content">
        <div class="modal-header livros-modal-header">
          <h3 class="modal-title livros-modal-title" id="livrosModalTitulo">Livros</h3>
          <button
            type="button"
            class="btn-close livros-modal-close"
            data-bs-dismiss="modal"
            aria-label="Fechar"
          ></button>
        </div>
        <div class="modal-body livros-modal-body">
          <div id="livrosModalGrid" class="livros-modal-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="app-footer">
    <div class="footer-left">
      <a href="/frontend/src/pages/index.html">Home</a>
      <a href="/frontend/src/pages/perfil.html">Perfil</a>
    </div>

    <div class="footer-center">
      <img src="/frontend/logo.png" alt="Logo" class="footer-logo">
    </div>

    <div class="footer-right">
      <small>Todos os direitos reservados</small>
    </div>
  </footer>

  <script src="/frontend-config.js"></script>
  <script src="/frontend/script.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script>
    let livrosCached = [];
    let generosFiltrados = {};
    let livrosModalInstance = null;
    const LIMITE_LIVROS_VITRINE = 6;

    function normalizarGeneroCategoria(genero) {
      const valor = String(genero || "").trim();

      const mapa = {
        Romance: "Romance",
        Fantasia: "Fantasia",
        Terror: "Terror",
        Aventura: "Aventura",
        Ficcao_Cientifica: "Ficcao_Cientifica",
        "Ficcao Cientifica": "Ficcao_Cientifica",
        "Ficção Científica": "Ficcao_Cientifica",
        Drama: "Drama",
        Autoajuda: "Autoajuda",
        Outro: "Outro",
        Outros: "Outro",
      };

      return mapa[valor] || "Outro";
    }

    function obterTituloGenero(genero) {
      const generoNormalizado = normalizarGeneroCategoria(genero);

      const titulos = {
        Romance: "Romance",
        Fantasia: "Fantasia",
        Terror: "Terror",
        Aventura: "Aventura",
        Ficcao_Cientifica: "Ficcao Cientifica",
        Drama: "Drama",
        Autoajuda: "Autoajuda",
        Outro: "Outros",
      };

      return titulos[generoNormalizado] || "Outros";
    }

    function obterCapaLivro(livro) {
      const capa = livro.imagem_capa && livro.imagem_capa.trim()
        ? livro.imagem_capa
        : (window.DEFAULT_BOOK_COVER_URL || "https://gabrielchalita.com.br/wp-content/uploads/2019/12/semcapa.png");

      return typeof normalizarUrlMidia === "function" ? normalizarUrlMidia(capa) : capa;
    }

    function abrirLivro(livro) {
      const usuarioId = getUsuarioLogadoId();
      if (!usuarioId) {
        alert("Você precisa estar logado para ver mais detalhes");
        window.location.href = "/frontend/login.html";
        return;
      }

      irParaAvaliacao(livro.livro_id || livro.id);
    }

    function criarCardLivro(livro) {
      const img = document.createElement("img");
      img.src = obterCapaLivro(livro);
      img.alt = livro.titulo || "Livro";
      img.title = livro.titulo || "Livro";
      img.loading = "lazy";
      img.style.cursor = "pointer";
      img.addEventListener("click", () => abrirLivro(livro));
      return img;
    }

    function fecharModalLivros() {
      livrosModalInstance?.hide();
    }

    function abrirModalLivros(genero, livros) {
      const tituloModal = document.getElementById("livrosModalTitulo");
      const gridModal = document.getElementById("livrosModalGrid");
      const modalBody = document.querySelector("#livrosModal .modal-body");

      if (!livrosModalInstance || !tituloModal || !gridModal || !modalBody) {
        return;
      }

      tituloModal.textContent = obterTituloGenero(genero).toUpperCase();
      gridModal.innerHTML = "";

      livros.forEach((livro) => {
        gridModal.appendChild(criarCardLivro(livro));
      });

      modalBody.scrollTop = 0;
      livrosModalInstance.show();
    }

    function configurarModalLivros() {
      const modalElement = document.getElementById("livrosModal");
      if (!modalElement || typeof bootstrap === "undefined") {
        return;
      }

      livrosModalInstance = bootstrap.Modal.getOrCreateInstance(modalElement, {
        backdrop: true,
        keyboard: true,
        focus: true,
      });

      modalElement.addEventListener("shown.bs.modal", () => {
        const modalBody = modalElement.querySelector(".modal-body");
        if (modalBody) {
          modalBody.scrollTop = 0;
        }
      });
    }

    async function carregarCategoriasLivros() {
      window.renderIndexSkeleton?.();

      try {
        const resposta = await fetch(window.apiUrl("/livros/"));
        if (!resposta.ok) {
          throw new Error(`Erro ao buscar livros: ${resposta.status}`);
        }

        const data = await resposta.json();
        livrosCached = data.livros || [];

        const livrosPorGenero = {};
        livrosCached.forEach((livro) => {
          const genero = normalizarGeneroCategoria(livro.genero);
          if (!livrosPorGenero[genero]) {
            livrosPorGenero[genero] = [];
          }
          livrosPorGenero[genero].push(livro);
        });

        generosFiltrados = livrosPorGenero;
        renderizarCategorias(livrosPorGenero);
      } catch (error) {
        console.error("Erro ao carregar categorias:", error);
        const container = document.getElementById("categoriesContainer");
        if (container) {
          container.innerHTML = `
            <h2 class="section-title">MAIS FAMOSOS DO MOMENTO</h2>
            <p class="sem-resultados">Nao foi possivel carregar os livros agora.</p>
          `;
        }
      }
    }

    function renderizarCategorias(livrosPorGenero) {
      const container = document.getElementById("categoriesContainer");
      const titulo = container.querySelector(".section-title");

      container.innerHTML = "";
      if (titulo) {
        container.appendChild(titulo);
      }

      Object.entries(livrosPorGenero).forEach(([genero, livros]) => {
        if (livros.length === 0) return;

        const categoriaDiv = document.createElement("div");
        categoriaDiv.className = "categoria";

        const h3 = document.createElement("h3");
        h3.textContent = obterTituloGenero(genero).toUpperCase();

        const livrosDiv = document.createElement("div");
        livrosDiv.className = "livros";

        livros.slice(0, LIMITE_LIVROS_VITRINE).forEach((livro) => {
          livrosDiv.appendChild(criarCardLivro(livro));
        });

        const verMais = document.createElement("button");
        verMais.type = "button";
        verMais.className = "ver-mais";
        verMais.textContent = livros.length > LIMITE_LIVROS_VITRINE
          ? `ver mais (${livros.length - LIMITE_LIVROS_VITRINE} restantes)`
          : "ver todos";
        verMais.addEventListener("click", () => abrirModalLivros(genero, livros));

        categoriaDiv.appendChild(h3);
        categoriaDiv.appendChild(livrosDiv);
        categoriaDiv.appendChild(verMais);

        container.appendChild(categoriaDiv);
      });

      if (container.children.length === 1 && titulo) {
        const vazio = document.createElement("p");
        vazio.className = "sem-resultados";
        vazio.textContent = "Nenhum livro encontrado para essa busca.";
        container.appendChild(vazio);
      }
    }

    function filtrarLivros(termo) {
      if (!termo.trim()) {
        renderizarCategorias(generosFiltrados);
        return;
      }

      const termoLower = termo.toLowerCase();
      const livrosFiltrados = livrosCached.filter((livro) =>
        livro.titulo.toLowerCase().includes(termoLower) ||
        livro.autor.toLowerCase().includes(termoLower),
      );

      const livrosPorGenero = {};
      livrosFiltrados.forEach((livro) => {
        const genero = normalizarGeneroCategoria(livro.genero);
        if (!livrosPorGenero[genero]) {
          livrosPorGenero[genero] = [];
        }
        livrosPorGenero[genero].push(livro);
      });

      renderizarCategorias(livrosPorGenero);
    }

    document.getElementById("searchInput")?.addEventListener("input", (e) => {
      filtrarLivros(e.target.value);
    });

    window.addEventListener("DOMContentLoaded", () => {
      configurarModalLivros();
      carregarCategoriasLivros();
    });

    document.addEventListener("LivroCadastrado", () => {
      carregarCategoriasLivros();
    });
  </script>
</body>
</html>
