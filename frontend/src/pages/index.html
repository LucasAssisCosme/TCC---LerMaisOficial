<body class="home-page">

       <li class="item-list">

  <section class="banner">

      <h1>BEM-VINDO AO<br>LER MAIS!</h1>
    </div>

    <div class="banner-right">
      <p>
        Bem-vindo! Cada livro é uma nova descoberta.

  <main>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Pesquise livros">

  </main>

  <div
    class="modal"
    id="livrosModal"
    tabindex="-1"
    aria-labelledby="livrosModalTitulo"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable livros-modal-dialog">
      <div class="modal-content livros-modal-content">
        <div class="modal-header livros-modal-header">
          <h3 class="modal-title livros-modal-title" id="livrosModalTitulo">Livros</h3>
          <button
            type="button"
            class="btn-close livros-modal-close"
            data-bs-dismiss="modal"
            aria-label="Fechar"
          ></button>
        </div>
        <div class="modal-body livros-modal-body" tabindex="0">
          <div id="livrosModalGrid" class="livros-modal-grid"></div>
        </div>
      </div>

  <footer class="app-footer">
    <div class="footer-left">
      <a href="index.html">Home</a>
      <a href="perfil.html">Perfil</a>
    </div>

    <div class="footer-center">
      <img src="../../logo.png" alt="Logo" class="footer-logo">
    </div>

    <div class="footer-right">
      <small>Todos os direitos reservados</small>
    </div>
  </footer>

  <script src="/frontend-config.js"></script>
  <script src="../../script.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script>
    let livrosCached = [];
    let livrosModalInstance = null;
    const LIMITE_LIVROS_VITRINE = 6;
    const INDEX_RECENT_BOOKS_TITLE = "Adicionados Recentemente";
    const INDEX_RECENT_COLLECTION_KEY = "__recentes__";
    const INDEX_RECENT_BOOKS_STORAGE_KEY = "lerMaisLivrosRecentes";
    const INDEX_RECENT_BOOKS_WINDOW_MS = 14 * 24 * 60 * 60 * 1000;

    function normalizarGeneroCategoria(genero) {
      const valor = String(genero || "").trim();

      const mapa = {
        Romance: "Romance",
        Fantasia: "Fantasia",
        Terror: "Terror",
        Aventura: "Aventura",
        Ficcao_Cientifica: "Ficcao_Cientifica",
        "Ficcao Cientifica": "Ficcao_Cientifica",
        "Ficção Científica": "Ficcao_Cientifica",
        Drama: "Drama",
        Autoajuda: "Autoajuda",
        Outro: "Outro",
        Outros: "Outro",
      };

      return mapa[valor] || "Outro";
    }

    function obterTituloGenero(genero) {
      const generoNormalizado = normalizarGeneroCategoria(genero);

      const titulos = {
        Romance: "Romance",
        Fantasia: "Fantasia",
        Terror: "Terror",
        Aventura: "Aventura",
        Ficcao_Cientifica: "Ficção Científica",
        Drama: "Drama",
        Autoajuda: "Autoajuda",
        Outro: "Outros",
      };

      return titulos[generoNormalizado] || "Outros";
    }

    function obterTituloColecao(colecao) {
      if (colecao === INDEX_RECENT_COLLECTION_KEY) {
        return INDEX_RECENT_BOOKS_TITLE;
      }

      return obterTituloGenero(colecao);
    }

    function obterCapaLivro(livro) {
      const capa = livro.imagem_capa && livro.imagem_capa.trim()
        ? livro.imagem_capa
        : (window.DEFAULT_BOOK_COVER_URL || "https://gabrielchalita.com.br/wp-content/uploads/2019/12/semcapa.png");

      return typeof normalizarUrlMidia === "function" ? normalizarUrlMidia(capa) : capa;
    }

    function obterLivroId(livro) {
      return String(livro?.livro_id ?? livro?.id ?? "").trim();
    }

    function lerLivrosRecentesLocais() {
      try {
        const bruto = localStorage.getItem(INDEX_RECENT_BOOKS_STORAGE_KEY);
        const registros = bruto ? JSON.parse(bruto) : {};
        const agora = Date.now();
        const filtrados = {};

        Object.entries(registros || {}).forEach(([id, dataIso]) => {
          const timestamp = Date.parse(String(dataIso || ""));
          if (!Number.isNaN(timestamp) && agora - timestamp <= INDEX_RECENT_BOOKS_WINDOW_MS) {
            filtrados[id] = new Date(timestamp).toISOString();
          }
        });

        localStorage.setItem(
          INDEX_RECENT_BOOKS_STORAGE_KEY,
          JSON.stringify(filtrados),
        );

        return filtrados;
      } catch (error) {
        console.warn("[Home] Nao foi possivel ler livros recentes locais:", error);
        return {};
      }
    }

    function obterDataLivroEmMillis(livro) {
      const candidatos = [
        livro?.criado_em,
        livro?.created_at,
        livro?.data_cadastro,
        livro?.data_criacao,
      ];

      for (const valor of candidatos) {
        if (!valor) {
          continue;
        }

        const texto = String(valor).trim();
        if (!texto) {
          continue;
        }

        const normalizado = texto.includes("T") ? texto : texto.replace(" ", "T");
        const timestamp = Date.parse(normalizado);
        if (!Number.isNaN(timestamp)) {
          return timestamp;
        }
      }

      const livroId = obterLivroId(livro);
      if (!livroId) {
        return null;
      }

      const registrosLocais = lerLivrosRecentesLocais();
      const timestampLocal = Date.parse(String(registrosLocais[livroId] || ""));
      return Number.isNaN(timestampLocal) ? null : timestampLocal;
    }

    function livroEhRecente(livro) {
      const timestamp = obterDataLivroEmMillis(livro);
      if (timestamp === null) {
        return false;
      }

      return Date.now() - timestamp <= INDEX_RECENT_BOOKS_WINDOW_MS;
    }

    function ordenarLivrosRecentes(livros) {
      return [...livros].sort((a, b) => {
        const dataB = obterDataLivroEmMillis(b) || 0;
        const dataA = obterDataLivroEmMillis(a) || 0;
        if (dataB !== dataA) {
          return dataB - dataA;
        }

        return Number(b?.id || b?.livro_id || 0) - Number(a?.id || a?.livro_id || 0);
      });
    }

    function abrirLivro(livro) {
      const usuarioId = getUsuarioLogadoId();
      if (!usuarioId) {
        alert("Você precisa estar logado para ver mais detalhes");
        window.location.href = window.frontendPath("/login.html");
        return;
      }

      irParaAvaliacao(livro.livro_id || livro.id);
    }

    function criarCardLivro(livro) {
      const img = document.createElement("img");
      img.src = obterCapaLivro(livro);
      img.alt = livro.titulo || "Livro";
      img.title = livro.titulo || "Livro";
      img.loading = "lazy";
      img.style.cursor = "pointer";
      img.addEventListener("click", () => abrirLivro(livro));
      return img;
    }

    function fecharModalLivros() {
      livrosModalInstance?.hide();
    }

    function abrirModalLivros(colecao, livros) {
      const tituloModal = document.getElementById("livrosModalTitulo");
      const gridModal = document.getElementById("livrosModalGrid");
      const modalBody = document.querySelector("#livrosModal .modal-body");

      if (!livrosModalInstance || !tituloModal || !gridModal || !modalBody) {
        return;
      }

      tituloModal.textContent = obterTituloColecao(colecao).toUpperCase();
      gridModal.innerHTML = "";

      livros.forEach((livro) => {
        gridModal.appendChild(criarCardLivro(livro));
      });

      modalBody.scrollTop = 0;
      
      // Fazer scroll automático para o modal
      livrosModalInstance.show();
    }

    function configurarModalLivros() {
      const modalElement = document.getElementById("livrosModal");
      if (!modalElement || typeof bootstrap === "undefined") {
        return;
      }

      livrosModalInstance = bootstrap.Modal.getOrCreateInstance(modalElement, {
        backdrop: true,
        keyboard: true,
        focus: true,
      });

      modalElement.addEventListener("shown.bs.modal", () => {
        const modalBody = modalElement.querySelector(".modal-body");
        if (modalBody) {
          modalBody.scrollTop = 0;
          if (typeof modalBody.focus === "function") {
            modalBody.focus();
          }
        }
        
        // Fazer scroll automático para o modal quando estiver visível
      });
    }

    function montarColecoesHome(livros) {
      const livrosPorGenero = {};
      const livrosRecentes = [];

      livros.forEach((livro) => {
        const genero = normalizarGeneroCategoria(livro.genero);
        if (!livrosPorGenero[genero]) {
          livrosPorGenero[genero] = [];
        }
        livrosPorGenero[genero].push(livro);

        if (livroEhRecente(livro)) {
          livrosRecentes.push(livro);
        }
      });

      return {
        livrosPorGenero,
        livrosRecentes: ordenarLivrosRecentes(livrosRecentes),
      };
    }

    function criarSecaoLivros(colecao, livros) {
      const categoriaDiv = document.createElement("div");
      categoriaDiv.className = "categoria";

      const h3 = document.createElement("h3");
      h3.textContent = obterTituloColecao(colecao).toUpperCase();

      const livrosDiv = document.createElement("div");
      livrosDiv.className = "livros";

      livros.slice(0, LIMITE_LIVROS_VITRINE).forEach((livro) => {
        livrosDiv.appendChild(criarCardLivro(livro));
      });

      const verMais = document.createElement("button");
      verMais.type = "button";
      verMais.className = "ver-mais";
      verMais.textContent = livros.length > LIMITE_LIVROS_VITRINE
        ? `ver mais (${livros.length - LIMITE_LIVROS_VITRINE} restantes)`
        : "ver todos";
      verMais.addEventListener("click", () => abrirModalLivros(colecao, livros));

      categoriaDiv.appendChild(h3);
      categoriaDiv.appendChild(livrosDiv);
      categoriaDiv.appendChild(verMais);

      return categoriaDiv;
    }

    function renderizarCategorias(livrosPorGenero, livrosRecentes = []) {
      const container = document.getElementById("categoriesContainer");
      const titulo = container.querySelector(".section-title");

      container.innerHTML = "";
      if (titulo) {
        container.appendChild(titulo);
      }

      if (livrosRecentes.length > 0) {
        container.appendChild(
          criarSecaoLivros(INDEX_RECENT_COLLECTION_KEY, livrosRecentes),
        );
      }

      Object.entries(livrosPorGenero).forEach(([genero, livros]) => {
        if (livros.length === 0) return;
        container.appendChild(criarSecaoLivros(genero, livros));
      });

      if (container.children.length === 1 && titulo) {
        const vazio = document.createElement("p");
        vazio.className = "sem-resultados";
        vazio.textContent = "Nenhum livro encontrado para essa busca.";
        container.appendChild(vazio);
      }
    }

    async function carregarCategoriasLivros() {
      window.renderIndexSkeleton?.();

      try {
        const resposta = await fetch(window.apiUrl("/livros/"));
        if (!resposta.ok) {
          throw new Error(`Erro ao buscar livros: ${resposta.status}`);
        }

        const data = await resposta.json();
        livrosCached = Array.isArray(data.livros) ? data.livros : [];

        const { livrosPorGenero, livrosRecentes } = montarColecoesHome(livrosCached);
        renderizarCategorias(livrosPorGenero, livrosRecentes);
      } catch (error) {
        console.error("Erro ao carregar categorias:", error);
        const container = document.getElementById("categoriesContainer");
        if (container) {
          container.innerHTML = `
            <h2 class="section-title">MAIS FAMOSOS DO MOMENTO</h2>
            <p class="sem-resultados">Não foi possível carregar os livros agora.</p>
          `;
        }
      }
    }

    function filtrarLivros(termo) {
      const termoNormalizado = String(termo || "").trim().toLowerCase();
      const livrosFiltrados = !termoNormalizado
        ? livrosCached
        : livrosCached.filter((livro) =>
          String(livro.titulo || "").toLowerCase().includes(termoNormalizado) ||
          String(livro.autor || "").toLowerCase().includes(termoNormalizado)
        );

      const { livrosPorGenero, livrosRecentes } = montarColecoesHome(livrosFiltrados);
      renderizarCategorias(livrosPorGenero, livrosRecentes);
    }

    document.getElementById("searchInput")?.addEventListener("input", (e) => {
      filtrarLivros(e.target.value);
    });

    window.addEventListener("DOMContentLoaded", () => {
      configurarModalLivros();
      carregarCategoriasLivros();
      
      // NÃO abrir modal vazio automaticamente - deixar usuário clicar em uma categoria
    });

    document.addEventListener("LivroCadastrado", () => {
      carregarCategoriasLivros();
    });
  </script>
</body>
</html>
