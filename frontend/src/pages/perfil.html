 <main class="perfil-container">

    <div class="circulo"></div>
    <br>

  <div class="grid-perfil">

    <div class="campo">
      <label>Nome</label>
      <input type="text" placeholder="Seu nome">
    </div>

    <div class="campo grande">
      <label>Bio</label>
      <textarea placeholder="Escreva sobre você..."></textarea>
    </div>

    <div class="campo">
      <label>Email</label>
      <input type="text">
    </div>

    <div class="campo">
      <label>Username</label>
      <input type="text">
    </div>

    <div class="campo">
      <label>Gênero Preferido</label>
      <input type="text">
    </div>

    <div class="campo">
      <label>Tipo</label>
      <input type="text">
    </div>

  </div>
 <br>
