<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ler Mais - Início</title>

    <link rel="stylesheet" href="/frontend/src/css/perfil.css" />
    
  </head>

  <body class="home-page">
  <header>
    <div class="header container"> 
      <div class="info-perfil">
            <img src="/frontend/logo.png" alt="">    
            <div class="perfil">
              <img id="fotoPerfil" src="/frontend/User.png" alt="Foto de perfil" style="cursor: pointer;" onclick="document.getElementById('inputFotoPerfil').click()">
              <input id="inputFotoPerfil" type="file" accept="image/*" style="display: none;">
                <a href="/frontend/src/pages/perfil.html">PERFIL</a>
            </div>
      </div>        

      <nav>
        <ul class="nav-list">
          <li class="item-list">
            <a href="/frontend/src/pages/index.html">Inicio</a>
          </li>
          <li class="item-list">
            <a href="/frontend/src/pages/cadastroLivro.html">Cadastrar Livros</a>
          </li>
          <li class="item-list">
            <a href="/frontend/src/pages/biblioteca.html">Biblioteca</a>
          </li>
          <li class="item-list">
            <a href="/frontend/login.html">Saida</a>
          </li>

        </ul>
      </nav>
    </div>
  </header>

 <main class="perfil-container">

  <h1 class="titulo">Editar Perfil</h1>

  <br>

  <!-- FOTO -->
 <div class="foto-perfil">
    <label>Foto de perfil</label>
  
  <!-- imagem -->
  <img id="fotoPerfilMain" src="/frontend/User.png" alt="Foto de perfil" style="cursor: pointer;" onclick="document.getElementById('inputFoto').click()">

  <!-- input -->
  <input id="inputFoto" type="file" accept="image/*" style="display: none;">
</div>

  <!-- FORM -->
  <div class="grid-perfil">

    <div class="campo">
      <label>Nome</label>
      <input id="nome" type="text" placeholder="Seu nome">
    </div>

    <div class="campo grande">
      <label>Bio</label>
      <textarea id="bio" placeholder="Escreva sobre você..."></textarea>
    </div>

    <div class="campo">
      <label>Email</label>
      <input id="email" type="text" placeholder="Seu email">
    </div>

    <div class="campo">
      <label>Username</label>
      <input id="apelido" type="text" placeholder="Como quer ser chamado?">
    </div>

    <div class="campo">
      <label>Gênero Preferido</label>
      <input id="genero" type="text" placeholder="Seu genero favorito?">
    </div>


  </div>
 <br>
 <br>

  <!-- BOTÕES -->
  <div class="botoes">



    <button class="btn-editar" onclick="habilitarEdicao()">Editar</button>
   <button class="btn-cancelar" onclick="cancelarEdicao()">Cancelar</button>
  <button class="btn-salvar" onclick="salvarPerfil()">Salvar</button>

  </div>

</main>
<footer class="app-footer">

  <div class="footer-left">
    <a href="/frontend/src/pages/index.html">Home</a>
    <a href="/frontend/src/pages/perfil.html">Perfil</a>
  </div>

  <div class="footer-center">
    <img src="/frontend/logo.png" alt="Logo" class="footer-logo">
  </div>

  <div class="footer-right">
    <small>Todos os direitos reservados</small>
  </div>

</footer>

<script src="/frontend/script.js"></script>
</body>
</html>
