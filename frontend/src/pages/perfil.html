                <a href="perfil.html">PERFIL</a>
            </div>
      </div>        

       <nav>
  <ul class="nav-list">

    </div>
  </header>

 <main class="perfil-container">

  <h1 class="titulo">Editar Perfil</h1>

  <br>

  <!-- FOTO -->
 <div class="foto-perfil">
    <label>Foto de perfil</label>
  
  <!-- imagem -->
  <img id="fotoPerfilMain" src="../../User.png" alt="Foto de perfil" style="cursor: pointer;" onclick="document.getElementById('inputFoto').click()">

  <!-- input -->
  <input id="inputFoto" type="file" accept="image/*" style="display: none;">
</div>

  <!-- FORM -->
  <div class="grid-perfil">

    <div class="campo">
      <label>Nome</label>
      <input id="nome" type="text" placeholder="Seu nome">
    </div>

    <div class="campo grande">
      <label>Bio</label>
      <textarea id="bio" placeholder="Escreva sobre você..."></textarea>
    </div>

    <div class="campo">
      <label>Email</label>
      <input id="email" type="text" placeholder="Seu email">
    </div>

    <div class="campo">
      <label>Username</label>
      <input id="apelido" type="text" placeholder="Como quer ser chamado?">
    </div>

    <div class="campo">
      <label>Gênero Preferido</label>
      <select id="genero">
        <option value="">Selecione um gênero</option>
        <option value="Romance">Romance</option>
        <option value="Fantasia">Fantasia</option>
        <option value="Terror">Terror</option>
        <option value="Aventura">Aventura</option>
        <option value="Ficcao_Cientifica">Ficção Científica</option>
        <option value="Drama">Drama</option>
        <option value="Autoajuda">Autoajuda</option>
        <option value="Outro">Outro</option>
      </select>
    </div>


  </div>
 <br>
 <br>

  <!-- BOTÕES -->
  <div class="botoes">

    <button class="btn-editar" onclick="habilitarEdicao()">Editar</button>
    <button class="btn-excluir-perfil" onclick="excluirPerfil()">Apagar Perfil</button>
    <button class="btn-cancelar" onclick="cancelarEdicao()">Cancelar</button>
    <button class="btn-salvar" onclick="salvarPerfil()">Salvar</button>

  </div>

</main>
