<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ler Mais - Perfil</title>
    <link rel="icon" type="image/png" href="../../logo.png" />
    <link rel="stylesheet" href="../../page-transition.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="../css/perfil.css?v=20260427a" />
  </head>

  <body class="home-page">
    <header>
      <div class="header">
        <div class="info-perfil">
          <img src="../../logo.png" alt="">
           <span class="logo-text">LER MAIS</span>
          <div class="perfil">
            <img
              id="fotoPerfil"
              src="../../User.png"
              alt="Foto de perfil"
              style="cursor: pointer;"
              onclick="document.getElementById('inputFotoPerfil').click()"
            >
            <input id="inputFotoPerfil" type="file" accept="image/*" style="display: none;">
            <a href="perfil.html">PERFIL</a>
          </div>
        </div>

        <nav>
          <ul class="nav-list">
            <li class="item-list">
              <a href="index.html">
                <i class="bi bi-house"></i>
                Início
              </a>
            </li>

            <li class="item-list">
              <a href="cadastroLivro.html">
                <i class="bi bi-plus-circle"></i>
                Cadastrar
              </a>
            </li>

            <li class="item-list">
              <a href="biblioteca.html">
                <i class="bi bi-book"></i>
                Biblioteca
              </a>
            </li>

            <li class="item-list">
              <a href="gerenciamento-usuarios.html">
                <i class="bi bi-people"></i>
                Gerenciar Usuários
              </a>
            </li>

            <li class="item-list">
              <a href="../../login.html">
                <i class="bi bi-box-arrow-right"></i>
                Sair
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="perfil-container">
      <h1 class="titulo">Editar Perfil</h1>

      <br>

      <div class="foto-perfil">
        <label>Foto de perfil</label>
        <button
          class="foto-acao"
          type="button"
          onclick="document.getElementById('inputFoto').click()"
          aria-label="Alterar foto de perfil"
        >
          <img
            id="fotoPerfilMain"
            src="../../User.png"
            alt="Foto de perfil"
          >
          <span class="foto-icone">
            <i class="bi bi-camera-fill"></i>
          </span>
        </button>
        <input id="inputFoto" type="file" accept="image/*" style="display: none;">
        <small class="foto-dica">Clique na foto para alterar</small>
      </div>

      <div class="grid-perfil">
        <div class="campo">
          <label>Nome</label>
          <input id="nome" type="text" placeholder="Seu nome">
        </div>

        <div class="campo grande">
          <label>Bio</label>
          <textarea id="bio" placeholder="Escreva sobre você..."></textarea>
        </div>

        <div class="campo">
          <label>Email</label>
          <input id="email" type="text" placeholder="Seu email">
        </div>

        <div class="campo">
          <label>Username</label>
          <input id="apelido" type="text" placeholder="Como quer ser chamado?">
        </div>

        <div class="campo">
          <label>Gênero Preferido</label>
          <select id="genero">
            <option value="">Selecione um gênero</option>
            <option value="Romance">Romance</option>
            <option value="Fantasia">Fantasia</option>
            <option value="Terror">Terror</option>
            <option value="Aventura">Aventura</option>
            <option value="Ficcao_Cientifica">Ficção Científica</option>
            <option value="Drama">Drama</option>
            <option value="Autoajuda">Autoajuda</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
      </div>

      <br>
      <br>

      <div class="botoes">
        <button class="btn-editar" onclick="habilitarEdicao()">Editar</button>
        <button class="btn-excluir-perfil" onclick="excluirPerfil()">Apagar Perfil</button>
        <button class="btn-cancelar" onclick="cancelarEdicao()" hidden>Cancelar</button>
        <button class="btn-salvar" onclick="salvarPerfil()" hidden>Salvar</button>
      </div>
      <p id="perfilFeedback" class="form-feedback" aria-live="polite"></p>
    </main>

    <footer class="app-footer">
      <div class="footer-left">
        <a href="index.html">Home</a>
        <a href="perfil.html">Perfil</a>
      </div>

      <div class="footer-center">
        <img src="../../logo.png" alt="Logo" class="footer-logo">
      </div>

      <div class="footer-right">
        <small>Todos os direitos reservados</small>
      </div>
    </footer>

    <script src="/frontend-config.js"></script>
    <script src="../../script.js?v=20260504a"></script>
  </body>
</html>
