<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ler Mais - Informações</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/informacoes.css" />
  </head>

  <body class="home-page">
    <header>
      <div class="header">
        <div class="info-perfil">
          <img src="../../logo.png" alt="" />
          <div class="perfil">
            <img src="../../User.png" alt="" />
            <a href="perfil.html">PERFIL</a>
          </div>
        </div>

        <nav>
          <ul class="nav-list">
            <li class="item-list">
              <a href="index.html">
                <i class="bi bi-house"></i>
                Início
              </a>
            </li>

            <li class="item-list">
              <a href="cadastroLivro.html">
                <i class="bi bi-plus-circle"></i>
                Cadastrar
              </a>
            </li>

            <li class="item-list">
              <a href="biblioteca.html">
                <i class="bi bi-book"></i>
                Biblioteca
              </a>
            </li>

            <li class="item-list">
              <a href="../../login.html">
                <i class="bi bi-box-arrow-right"></i>
                Sair
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="informacoes-container">
      <div class="livro-info">
        <div class="livro-capa">
          <img id="capaCapa" src="" alt="Capa do livro" />
          <div class="capa-edicao" id="capaEdicaoInfo" style="display: none">
            <label for="capaLivroFileEdit" class="label-edit">Imagem da Capa</label>
            <input
              type="file"
              id="capaLivroFileEdit"
              accept="image/*"
              class="input-edit"
            />
          </div>
        </div>

        <div class="livro-detalhes">
          <div id="infoVisualizacao">
            <h1 id="tituloInfo"></h1>
            <p class="autor" id="autorInfo"></p>

            <div class="meta-livro">
              <p class="genero" id="generoInfo"></p>
              <p class="ano" id="anoInfo"></p>
              <p class="paginas" id="paginasInfo"></p>
              <p class="editora" id="editoraInfo"></p>
            </div>

            <div class="descricao-completa">
              <h2>Descrição</h2>
              <p id="descricaoInfo"></p>
            </div>
          </div>

          <div id="infoEdicao" class="edicao-livro" style="display: none">
            <label for="tituloLivroEdit" class="label-edit">Título</label>
            <input
              type="text"
              id="tituloLivroEdit"
              class="input-edit"
              placeholder="Título do livro"
            />

            <label for="autorLivroEdit" class="label-edit">Autor</label>
            <input
              type="text"
              id="autorLivroEdit"
              class="input-edit"
              placeholder="Autor do livro"
            />

            <div class="linha-edicao">
              <div>
                <label for="generoLivroEdit" class="label-edit">Gênero</label>
                <select id="generoLivroEdit" class="input-edit">
                  <option value="">Selecione um gênero</option>
                  <option value="Romance">Romance</option>
                  <option value="Fantasia">Fantasia</option>
                  <option value="Terror">Terror</option>
                  <option value="Aventura">Aventura</option>
                  <option value="Ficcao_Cientifica">Ficção Científica</option>
                  <option value="Drama">Drama</option>
                  <option value="Autoajuda">Autoajuda</option>
                  <option value="Outro">Outro</option>
                </select>
              </div>

              <div>
                <label for="anoLivroEdit" class="label-edit">Ano</label>
                <input
                  type="number"
                  id="anoLivroEdit"
                  class="input-edit"
                  placeholder="Ano"
                />
              </div>
            </div>

            <div class="linha-edicao">
              <div>
                <label for="paginasLivroEdit" class="label-edit">Páginas</label>
                <input
                  type="number"
                  id="paginasLivroEdit"
                  class="input-edit"
                  placeholder="Número de páginas"
                />
              </div>

              <div>
                <label for="editoraLivroEdit" class="label-edit">Editora</label>
                <input
                  type="text"
                  id="editoraLivroEdit"
                  class="input-edit"
                  placeholder="Editora"
                />
              </div>
            </div>

            <label for="descricaoLivroEdit" class="label-edit">Descrição</label>
            <textarea
              id="descricaoLivroEdit"
              class="textarea-edit"
              rows="6"
              placeholder="Descrição do livro"
            ></textarea>
          </div>

          <div class="acoes" id="acoesLivro" style="display: none">
            <button class="btn-primario" onclick="irParaAvaliacao()">
              Voltar para Avaliação
            </button>
            <button class="btn-secundario" onclick="habilitarEdicaoLivro()">
              Editar Livro
            </button>
            <button class="btn-perigo" onclick="deletarLivro()">
              Deletar Livro
            </button>
          </div>

          <div class="acoes" id="acoesEdicao" style="display: none">
            <button class="btn-primario" onclick="salvarAlteracoesLivro()">
              Salvar Alterações
            </button>
            <button class="btn-secundario" onclick="cancelarEdicaoLivro()">
              Cancelar Edição
            </button>
          </div>

          <div class="acoes" id="acoesLivroLeitor">
            <button class="btn-primario" onclick="irParaAvaliacao()">
              Voltar para Avaliação
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <div class="footer-left">
        <a href="index.html">Home</a>
        <a href="perfil.html">Perfil</a>
      </div>

      <div class="footer-center">
        <img src="../../logo.png" alt="Logo" class="footer-logo" />
      </div>

      <div class="footer-right">
        <small>Todos os direitos reservados</small>
      </div>
    </footer>
  </body>
  <script src="/frontend-config.js"></script>
  <script src="../../script.js"></script>
</html>
