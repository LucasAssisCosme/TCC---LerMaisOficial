<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ler Mais - Informações</title>

    <link rel="stylesheet" href="/frontend/src/css/informacoes.css" />
  </head>

  <body class="home-page">
  <header>
    <div class="header container"> 
      <div class="info-perfil">
            <img src="../../logo.png" alt="">    
            <div class="perfil">
              <img src="../../User.png" alt="">
               <a href="/frontend/src/pages/perfil.html">PERFIL</a>
            </div>
      </div>        

      <nav>
        <ul class="nav-list">
          <li class="item-list">
            <a href="/frontend/src/pages/index.html">Inicio</a>
          </li>
          <li class="item-list">
            <a href="/frontend/src/pages/cadastroLivro.html">Cadastrar Livros</a>
          </li>
          <li class="item-list">
            <a href="/frontend/src/pages/biblioteca.html">Biblioteca</a>
          </li>
          <li class="item-list">
            <a href="/frontend/login.html">Saida</a>
          </li>

        </ul>
      </nav>
    </div>
  </header>

  <main class="informacoes-container">
    <div class="livro-info">
      <div class="livro-capa">
        <img id="capaCapa" src="" alt="Capa do livro">
      </div>
      
      <div class="livro-detalhes">
        <h1 id="tituloInfo"></h1>
        <p class="autor" id="autorInfo"></p>
        <p class="genero" id="generoInfo"></p>
        <p class="ano" id="anoInfo"></p>
        <p class="paginas" id="paginasInfo"></p>
        
        <div class="descricao-completa">
          <h2>Descrição</h2>
          <p id="descricaoInfo"></p>
        </div>

        <div class="acoes">
          <button class="btn-primario" onclick="irParaAvaliacao()">Voltar para Avaliação</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="app-footer">

  <div class="footer-left">
    <a href="/frontend/src/pages/index.html">Home</a>
    <a href="/frontend/src/pages/perfil.html">Perfil</a>
  </div>

  <div class="footer-center">
    <img src="/frontend/logo.png" alt="Logo" class="footer-logo">

  </div>

</footer>
