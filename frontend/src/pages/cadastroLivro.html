<main class="cadastro-box">

  <h1>CADASTRAR LIVRO</h1>

  <form class="formulario cadastro-livro-form">

    <!-- ESQUERDA -->
    <div class="lado-esquerdo">

      <div class="campo">
        <label>Nome Livro</label> 
        <input type="text" name="nome" placeholder="Digite o nome do livro">
      </div>

      <div class="campo">
        <label>Número de páginas</label>
        <input type="number" name="paginas" placeholder="Ex: 350">
      </div>

      <div class="campo">
        <label>Ano</label>
        <input type="number" name="ano" min="1000" max="2026" required placeholder="Ex: 2023">
      </div>

      <div class="campo">
        <label>Editora</label>
        <input type="text" name="editora" placeholder="Nome da editora">
      </div>

      <div class="campo">
        <label>Assunto</label>
        <select name="assunto" required>
          <option value="">Selecione um genero</option>
          <option value="Romance">Romance</option>
          <option value="Fantasia">Fantasia</option>
          <option value="Terror">Terror</option>
          <option value="Aventura">Aventura</option>
          <option value="Ficcao_Cientifica">Ficcao Científica</option>
          <option value="Drama">Drama</option>
          <option value="Autoajuda">Autoajuda</option>
          <option>Outros</option>
        </select>
      </div>

      <div class="campo">
        <label>Autor</label>
        <input type="text" name="autor" placeholder="Nome do autor">
      </div>
    </div>

    <!-- DIREITA -->
   <div class="lado-direito">

    <div class="campo">
      <label>Descrição</label>
      <textarea name="descricao" class="descricao-box" placeholder="Escreva uma breve descrição do livro..."></textarea>
    </div>

    <div class="campo">
      <label>Imagem do Livro</label>
      <input type="file" id="inputImagemLivro" name="imagemFile" accept="image/*" required>
    </div>

    <img 
      id="previewImagem"
      src="https://static.vecteezy.com/ti/vetor-gratis/p1/26619142-padrao-avatar-perfil-icone-do-social-meios-de-comunicacao-do-utilizador-foto-imagem-vetor.jpg"
      class="preview">

    <button type="submit">Confirmar</button>

  </div>
  </form>

<script>
const inputImagemLivro = document.getElementById("inputImagemLivro");
const previewImagem = document.getElementById("previewImagem");

// Preview ao selecionar arquivo
inputImagemLivro.addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(event) {
      previewImagem.src = event.target.result;
    };
    reader.readAsDataURL(file);
  }
});
</script>
