<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ler-mais Cadastro de Livro</title>
    <link rel="stylesheet" href="/frontend/src/css/cadastroDelivro.css" />

  </head>
    <body class="home-page">
<header>

      <div class="header container"> 
      <div class="info-perfil">
            <img src="../../logo.png" alt="">    
            <div class="perfil">
              <img src="../../User.png" alt="">
              <a href="/frontend/src/pages/perfil.html">PERFIL</a>
            </div>
      </div>        

      <nav>
        <ul class="nav-list">
          <li class="item-list">
            <a href="/frontend/src/pages/index.html">Inicio</a>
          </li>
          <li class="item-list">
            <a href="/frontend/src/pages/cadastroLivro.html">Cadastrar Livros</a>
          </li>
          <li class="item-list">
            <a href="/frontend/src/pages/biblioteca.html">Biblioteca</a>
          </li>
          <li class="item-list">
            <a href="/frontend/login.html">Saida</a>
          </li>

        </ul>
      </nav>
    </div>
  </header>
<main class="cadastro-box">

  <h1>CADASTRAR LIVRO</h1>

  <form class="formulario cadastro-livro-form">

    <!-- ESQUERDA -->
    <div class="lado-esquerdo">

      <label>Nome Livro</label> 
      <input type="text" name="nome">

    
      <div class="linha">
        <div class="campo">
          <label>Número de páginas</label>
          <input type="number" name="paginas">
        </div>
      </div>

      <div>
      <label>Ano</label>
      <input type="number" name="ano" min="1000" max="2026" required>
</div>

<div>
      <label>Editora</label>
      <input type="text" name="editora">

      <label>Assunto</label>
      <select name="assunto">

        <option>Romance</option>
        <option>Fantasia</option>
        <option>Terror</option>
        <option>Aventura</option>
        <option>Ficcão Científica</option>
        <option>Drama</option>
        <option>Autoajuda</option>
        <option>Outros</option>
      </select>
</div>

<div>
      <label>Autor</label>
      <input type="text" name="autor">
</div>
    </div>

    <!-- DIREITA -->
   <div class="lado-direito">

<label>Descrição</label>
<textarea name="descricao" class="descricao-box"></textarea>

  <div class="campo2">
    <label>Imagem Livro</label>
    <input type="url" id="inputImagem" name="imagem" placeholder="Cole a URL da imagem">
  </div>

  <img 
    id="previewImagem"
    src="https://static.vecteezy.com/ti/vetor-gratis/p1/26619142-padrao-avatar-perfil-icone-do-social-meios-de-comunicacao-do-utilizador-foto-imagem-vetor.jpg"
    class="preview">

  <button type="submit">Confirmar</button>

</div>
  </form>

<script>
const inputImagem = document.getElementById("inputImagem");
const previewImagem = document.getElementById("previewImagem");

const imagemPadrao = "https://static.vecteezy.com/ti/vetor-gratis/p1/26619142-padrao-avatar-perfil-icone-do-social-meios-de-comunicacao-do-utilizador-foto-imagem-vetor.jpg";

inputImagem.addEventListener("input", () => {
  previewImagem.src = inputImagem.value || imagemPadrao;
});
</script>
</main>


 <footer class="app-footer">

  <div class="footer-left">
    <a href="/frontend/src/pages/index.html">Home</a>
    <a href="/frontend/src/pages/perfil.html">Perfil</a>
  </div>

  <div class="footer-center">
    <img src="/frontend/logo.png" alt="Logo" class="footer-logo">
  </div>

  <div class="footer-right">
    <small>Todos os direitos reservados</small>
  </div>

</footer>

    <script src="/frontend/script.js"></script>
    <script>
      const toggle = document.getElementById("navbarToggle");
      const mobileMenu = document.getElementById("mobileMenu");
      toggle?.addEventListener("click", () => {
        mobileMenu.classList.toggle("open");
      });
    </script>
  </body>
</html>
