<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="style.css?v=20260428a" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main class="login-page">
      <div class="login-card">
        <div class="login-box">
          <img src="logo.png" class="logo" />
          <h1 class="title">BEM-VINDO AO LER MAIS</h1>
        </div>
        <form action="#" method="POST" class="login-form">
          <div class="mb-3">
            <label for="inputEmail" class="form-label">Email</label>
            <input
              type="email"
              id="inputEmail"
              class="form-control form-control-lg"
              placeholder="Digite seu email"
              name="email"
              required
            />
          </div>

          <div class="mb-3">
            <label for="inputSenha" class="form-label">Senha</label>
            <div class="password-field">
              <input
                type="password"
                id="inputSenha"
                class="form-control form-control-lg"
                placeholder="Digite sua senha"
                name="senha"
                required
              />
              <button
                type="button"
                class="password-toggle"
                data-password-toggle
                aria-controls="inputSenha"
                aria-label="Mostrar senha"
                title="Mostrar senha"
                aria-pressed="false"
              >
                <span class="password-toggle__icon" aria-hidden="true">
                  <svg
                    class="eye-open"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7S2 12 2 12Z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <svg
                    class="eye-off"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M3 3l18 18" />
                    <path d="M10.6 10.7a3 3 0 0 0 4 4" />
                    <path d="M9.9 5.2A10.9 10.9 0 0 1 12 5c6.4 0 10 7 10 7a17.6 17.6 0 0 1-3 3.8" />
                    <path d="M6.6 6.7A17.2 17.2 0 0 0 2 12s3.6 7 10 7a10.7 10.7 0 0 0 5-1.2" />
                  </svg>
                </span>
                <span class="visually-hidden password-toggle__label">Mostrar senha</span>
              </button>
            </div>
          </div>

          <button type="submit" class="login">LOGIN</button>
          <p id="loginFeedback" class="form-feedback" aria-live="polite"></p>
        </form>

        <div class="extras text-center">
          <p class="mb-2">
            Não possui uma conta?
            <a href="src/pages/cadastroUsuario.html">Crie uma aqui!</a>
          </p>
          <p><a href="src/pages/redefinirSenha.html">Esqueceu a senha?</a></p>
        </div>
      </div>
    </main>

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> -->
    <script src="/frontend-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js?v=20260504a"></script>
  </body>
</html>
